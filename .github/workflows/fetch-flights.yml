name: Fetch Emirates Flights

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch OpenSky API data
        run: |
          mkdir -p public/data
          # Try to fetch — never fail the workflow if the API is down
          if curl -s "https://opensky-network.org/api/states/all" \
            -o public/data/flights.json \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5; then
            BYTES=$(wc -c < public/data/flights.json)
            echo "Fetched $BYTES bytes"
            if [ "$BYTES" -lt 50 ]; then
              echo "Warning: response too small, API may be unavailable"
            fi
          else
            echo "Warning: OpenSky API unreachable, keeping previous data"
          fi
      - name: Commit & push
        run: |
          git add public/data/flights.json
          git diff --quiet && echo "No changes" && exit 0
          git config user.name "Emirates Tracker Bot"
          git config user.email "bot@emirates-tracker"
          git commit -m "chore: update flight data [skip ci]"
          git push